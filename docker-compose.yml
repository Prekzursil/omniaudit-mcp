services:
  api:
    build:
      context: .
      dockerfile: infra/Dockerfile.api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://omniaudit:omniaudit@postgres:5432/omniaudit
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./data:/app/data
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
      - minio

  worker:
    build:
      context: .
      dockerfile: infra/Dockerfile.worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://omniaudit:omniaudit@postgres:5432/omniaudit
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./data:/app/data
    depends_on:
      - postgres
      - redis
      - minio

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: omniaudit
      POSTGRES_USER: omniaudit
      POSTGRES_PASSWORD: omniaudit
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  pg_data:
  minio_data:
