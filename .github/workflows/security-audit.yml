name: security-audit

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "45 4 * * 1"
  workflow_dispatch:

jobs:
  security-audit:
    name: security-audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv pip install --system -e '.[test]'

      - name: Install audit tooling
        run: python -m pip install pip-audit

      - name: Run pip-audit
        run: pip-audit --progress-spinner off
