name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv pip install --system -e '.[test,dev]'

      - name: Ruff
        run: ruff check .

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Shellcheck scripts
        run: shellcheck scripts/*.sh

      - name: Smoke script guard (missing dependencies)
        run: |
          tmpbin="$(mktemp -d)"
          ln -s "$(command -v bash)" "${tmpbin}/bash"
          set +e
          PATH="${tmpbin}" SMOKE_PREFLIGHT_ONLY=true ./scripts/smoke_hardening_pass2.sh
          rc="$?"
          set -e
          if [ "${rc}" -ne 10 ]; then
            echo "Expected smoke script to fail preflight with exit 10, got ${rc}"
            exit 1
          fi

  tests:
    name: tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv pip install --system -e '.[test]'

      - name: Run tests
        run: TMPDIR=/tmp TEMP=/tmp TMP=/tmp pytest -q -s

  ci:
    name: ci
    runs-on: ubuntu-latest
    needs: [lint, tests]
    steps:
      - name: CI status
        run: echo "lint and tests completed"
